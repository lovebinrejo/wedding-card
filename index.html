<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wedding Invitation – Sona Mol & Jaison R</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1a3a6b;
  --lb:#7ba7cc;
  --env-w:min(320px,88vw);
  --env-h:calc(var(--env-w)*0.66);
}
html,body{width:100%;height:100%;background:#060f1e;font-family:'Cinzel',serif;overflow:hidden;touch-action:manipulation}

/* ── CANVAS BG ── */
#bgCanvas{position:fixed;inset:0;z-index:0;width:100%;height:100%}

/* ── PETALS ── */
.petal{position:fixed;z-index:2;pointer-events:none;font-size:clamp(10px,2.5vw,16px);animation:petalFall linear infinite;opacity:0}
@keyframes petalFall{0%{transform:translateY(-40px) rotate(0deg);opacity:0}10%{opacity:.7}90%{opacity:.4}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── HEARTS ── */
.heart{position:fixed;z-index:2;pointer-events:none;color:#e87a9f;animation:heartRise ease-out forwards;opacity:0}
@keyframes heartRise{0%{transform:translateY(0) scale(0.5);opacity:0}20%{opacity:1;transform:translateY(-20px) scale(1)}80%{opacity:.6;transform:translateY(calc(-1 * var(--rise))) scale(1.1)}100%{opacity:0;transform:translateY(calc(-1 * var(--rise))) scale(0.8)}}

/* ── SCENE ── */
#scene{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(10px,2.5vw,18px)}

.top-label{color:var(--lb);font-size:clamp(9px,2.2vw,12px);letter-spacing:clamp(2px,1vw,5px);text-align:center;z-index:10;animation:fadeInDown 1s .2s both;text-shadow:0 0 20px rgba(123,167,204,.5)}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}

/* ── ENVELOPE ── */
.env-wrap{position:relative;z-index:10;width:var(--env-w);height:calc(var(--env-h) + 28px);cursor:pointer;animation:floatEnv 3s ease-in-out infinite}
@keyframes floatEnv{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.env-wrap.clicked{animation:none;cursor:default}

.env-body{position:absolute;bottom:0;left:0;width:var(--env-w);height:var(--env-h);background:linear-gradient(160deg,#d6e8f5,#b8d4eb);border-radius:4px 4px 14px 14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(123,167,204,.3),inset 0 1px 0 rgba(255,255,255,.4)}
.env-body::before{content:'';position:absolute;bottom:0;left:0;border-left:calc(var(--env-w)/2) solid transparent;border-right:calc(var(--env-w)/2) solid transparent;border-bottom:calc(var(--env-h)*.55) solid rgba(0,0,0,.08)}
.env-body::after{content:'';position:absolute;top:0;left:0;border-left:calc(var(--env-w)/2) solid rgba(0,0,0,.07);border-right:calc(var(--env-w)/2) solid transparent;border-top:calc(var(--env-h)*.5) solid transparent}
.env-right{position:absolute;bottom:0;right:0;border-right:calc(var(--env-w)/2) solid rgba(0,0,0,.05);border-top:calc(var(--env-h)*.5) solid transparent;border-bottom:calc(var(--env-h)*.5) solid transparent}

.env-flap{position:absolute;top:0;left:0;width:var(--env-w);transform-origin:top center;transform:rotateX(0deg);z-index:20;transition:transform 1.1s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
.env-flap svg{display:block;width:100%;height:auto}

.seal{position:absolute;top:calc(var(--env-h)*.38);left:50%;transform:translateX(-50%);z-index:30;width:clamp(44px,12vw,56px);height:clamp(44px,12vw,56px);background:radial-gradient(circle at 38% 32%,#4a8fd4,#1a3a6b);border-radius:50%;border:2px solid var(--lb);display:flex;align-items:center;justify-content:center;font-size:clamp(16px,4vw,22px);box-shadow:0 4px 24px rgba(0,0,0,.6),0 0 0 4px rgba(123,167,204,.15);animation:sealPulse 2s ease-in-out infinite}
@keyframes sealPulse{0%,100%{box-shadow:0 4px 24px rgba(0,0,0,.6),0 0 0 4px rgba(123,167,204,.15)}50%{box-shadow:0 4px 24px rgba(0,0,0,.6),0 0 0 10px rgba(123,167,204,.3)}}


.opened .seal{opacity:0;transform:translateX(-50%) scale(.3);animation:none}
.opened .env-flap{transform:rotateX(-178deg)}
.opened{animation:none !important;cursor:default}

/* ── BUTTONS ── */
#openBtn{display:block;z-index:10;background:transparent;color:var(--lb);font-family:'Cinzel',serif;font-size:clamp(9px,2.2vw,11px);letter-spacing:clamp(2px,1vw,4px);border:1px solid rgba(123,167,204,.5);padding:clamp(8px,2vw,11px) clamp(16px,4vw,26px);border-radius:40px;cursor:pointer;animation:breathe 2s infinite alternate,fadeInUp 1s .5s forwards;opacity:0}
@keyframes breathe{from{opacity:.5;box-shadow:0 0 0 0 rgba(123,167,204,0)}to{opacity:1;box-shadow:0 0 20px 4px rgba(123,167,204,.2)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
#openBtn.hide{opacity:0;pointer-events:none;transition:opacity .3s}

#viewBtn{display:none;z-index:10;background:var(--navy);color:#fff;font-family:'Cinzel',serif;font-size:clamp(10px,2.4vw,12px);letter-spacing:clamp(1px,.5vw,3px);border:1.5px solid var(--lb);padding:clamp(10px,2.5vw,13px) clamp(18px,5vw,32px);border-radius:40px;cursor:pointer;animation:glow 2s infinite alternate}
@keyframes glow{from{box-shadow:0 8px 24px rgba(0,0,0,.4)}to{box-shadow:0 8px 36px rgba(123,167,204,.5),0 0 20px rgba(123,167,204,.2)}}

/* ── FULL CARD OVERLAY ── */
#fullcard{display:none;position:fixed;inset:0;z-index:200;background:rgba(6,15,30,.97);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px clamp(10px,3vw,18px) 50px;flex-direction:column;align-items:center;overscroll-behavior:contain}
#fullcard.show{display:flex}

/* ── CARD IMAGE ── */
.fc-img-wrap{width:100%;max-width:420px;margin-top:8px;border-radius:clamp(14px,4vw,22px);overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.7),inset 0 0 0 1.5px rgba(123,167,204,.45);animation:cardReveal .8s cubic-bezier(.34,1.4,.64,1) forwards;position:relative}
@keyframes cardReveal{from{transform:scale(.75) translateY(80px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.fc-img-wrap img{width:100%;display:block;vertical-align:bottom}

/* shimmer */
.fc-img-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.35) 50%,transparent 60%);animation:shimmer 3.5s ease-in-out infinite;pointer-events:none}
@keyframes shimmer{0%{transform:translateX(-100%)}60%,100%{transform:translateX(200%)}}

/* close */
.fc-close{position:sticky;top:10px;align-self:flex-end;margin-bottom:-10px;z-index:300;background:rgba(26,58,107,.92);color:#fff;border:1px solid var(--lb);width:clamp(34px,8vw,42px);height:clamp(34px,8vw,42px);border-radius:50%;font-size:clamp(14px,3.5vw,18px);cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);box-shadow:0 4px 16px rgba(0,0,0,.4);font-family:sans-serif}

/* confetti */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:150;overflow:hidden}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div id="scene">
  <div class="top-label">✦ &nbsp; WEDDING INVITATION &nbsp; ✦</div>
  <div class="env-wrap" id="envWrap" onclick="openEnvelope()">
    <div class="env-body"></div>
    <div class="env-right"></div>
    <div class="env-flap" id="envFlap">
      <svg viewBox="0 0 320 112" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="fg" x1="0" y1="0" x2="0.5" y2="1">
            <stop offset="0%" stop-color="#cce3f2"/>
            <stop offset="100%" stop-color="#a4c6e0"/>
          </linearGradient>
        </defs>
        <polygon points="0,0 320,0 160,108" fill="url(#fg)"/>
        <polygon points="3,0 317,0 160,104" fill="#d8ecf7" opacity="0.55"/>
        <line x1="0" y1="0" x2="160" y2="108" stroke="rgba(123,167,204,0.3)" stroke-width="0.5"/>
        <line x1="320" y1="0" x2="160" y2="108" stroke="rgba(123,167,204,0.3)" stroke-width="0.5"/>
      </svg>
    </div>
    <div class="seal" id="seal">💍</div>
  </div>
  <button id="openBtn" onclick="openEnvelope()">TAP TO OPEN &nbsp;✦</button>
  <button id="viewBtn" onclick="showFullCard()">VIEW INVITATION &nbsp;✦</button>
</div>

<!-- FULL CARD -->
<div id="fullcard">
  <button class="fc-close" onclick="closeFullCard()">✕</button>
  <div class="fc-img-wrap">
    <img id="cardImg" src="" alt="Wedding Invitation – Sona Mol & Jaison R"/>
  </div>
</div>

<div id="confetti"></div>

// ── Canvas BG ──
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',()=>{resize();initParticles()});

class Particle{
  constructor(){this.reset(true)}
  reset(rand){
    this.x=Math.random()*W;
    this.y=rand?Math.random()*H:H+10;
    this.r=.5+Math.random()*2;
    this.alpha=.1+Math.random()*.7;
    this.speed=.1+Math.random()*.3;
    this.dx=(Math.random()-.5)*.2;
    this.ts=.005+Math.random()*.02;
    this.td=Math.random()>.5?1:-1;
  }
  update(){
    this.y-=this.speed;this.x+=this.dx;
    this.alpha+=this.ts*this.td;
    if(this.alpha>=.9)this.td=-1;
    if(this.alpha<=.1)this.td=1;
    if(this.y<-10)this.reset(false);
  }
  draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,210,240,${this.alpha})`;ctx.fill()}
}
function initParticles(){particles=Array.from({length:120},()=>new Particle())}
initParticles();

function drawBg(){
  const hue=220+Math.sin(Date.now()*.0003)*10;
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.8);
  g.addColorStop(0,`hsl(${hue},60%,8%)`);
  g.addColorStop(.5,`hsl(${hue+10},55%,5%)`);
  g.addColorStop(1,`hsl(${hue-10},50%,3%)`);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  const ng=ctx.createRadialGradient(W*.3,H*.4,0,W*.3,H*.4,W*.4);
  ng.addColorStop(0,'rgba(44,95,158,0.12)');ng.addColorStop(1,'transparent');
  ctx.fillStyle=ng;ctx.fillRect(0,0,W,H);
}
function animate(){drawBg();particles.forEach(p=>{p.update();p.draw()});requestAnimationFrame(animate)}
animate();

// ── Petals ──
const petalEmojis=['🌸','🌺','🌼','✿'];
function spawnPetal(){
  const el=document.createElement('div');el.className='petal';
  el.textContent=petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
  el.style.left=Math.random()*100+'%';
  el.style.animationDuration=(8+Math.random()*10)+'s';
  el.style.animationDelay=(Math.random()*3)+'s';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),22000);
}
setInterval(spawnPetal,1800);
for(let i=0;i<5;i++)setTimeout(spawnPetal,i*400);

// ── Pumping Hearts ──
function spawnHeart(){
  const el=document.createElement('div');el.className='heart';
  const size=clamp(14,4,22);
  const riseH=60+Math.random()*140;
  el.textContent='❤';
  el.style.cssText=`left:${20+Math.random()*60}%;top:${30+Math.random()*40}%;font-size:${size}px;--rise:${riseH}px;animation-duration:${1.5+Math.random()*1.5}s`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3200);
}
function clamp(val,min,max){return Math.min(max,Math.max(min,val))}
setInterval(spawnHeart,700);
for(let i=0;i<3;i++)setTimeout(spawnHeart,i*300);

// ── Envelope ──
let opened=false;
function openEnvelope(){
  if(opened)return;
  opened=true;
  document.getElementById('openBtn').classList.add('hide');
  document.getElementById('envWrap').classList.add('clicked','opened');
  setTimeout(launchConfetti,1250);
  setTimeout(()=>{
    const vb=document.getElementById('viewBtn');
    vb.style.display='block';
  },2300);
}

// ── Confetti ──
function launchConfetti(){
  const colors=['#7ba7cc','#1a3a6b','#c9a84c','#a8d8ea','#ffffff','#d6e8f5','#f0c8d8','#e87a9f'];
  const cont=document.getElementById('confetti');
  for(let i=0;i<90;i++){
    setTimeout(()=>{
      const p=document.createElement('div');
      const sz=4+Math.random()*8;
      p.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${20+Math.random()*60}%;top:${35+Math.random()*15}%;border-radius:${Math.random()>.5?'50%':'2px'};pointer-events:none`;
      cont.appendChild(p);
      p.animate([
        {transform:'translate(0,0) rotate(0deg)',opacity:1},
        {transform:`translate(${(Math.random()-.5)*350}px,${-(80+Math.random()*300)}px) rotate(${Math.random()*720-360}deg)`,opacity:0}
      ],{duration:1400+Math.random()*900,easing:'cubic-bezier(0,0.9,0.6,1)',fill:'forwards'});
      setTimeout(()=>p.remove(),2500);
    },i*20);
  }
}

// ── Full Card ──
function showFullCard(){
  document.getElementById('fullcard').classList.add('show');
  document.body.style.overflow='hidden';
  document.getElementById('fullcard').scrollTop=0;
}
function closeFullCard(){
  document.getElementById('fullcard').classList.remove('show');
  document.body.style.overflow='';
}

// swipe down to close
let tsy=0;
document.getElementById('fullcard').addEventListener('touchstart',e=>{tsy=e.touches[0].clientY},{passive:true});
document.getElementById('fullcard').addEventListener('touchend',e=>{
  if(e.changedTouches[0].clientY-tsy>80&&document.getElementById('fullcard').scrollTop===0)closeFullCard();
},{passive:true});

// Auto open
setTimeout(openEnvelope,2000);
</script>
